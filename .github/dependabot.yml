version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      runtime-dependencies:
        dependency-type: production
        patterns:
          - "@modelcontextprotocol/sdk"
          - "@opentelemetry/*"
          - "@protobufjs/*"
          - "@hono/node-server"
          - dotenv
          - express-rate-limit
          - fast-uri
          - hono
          - ip-address
          - path-to-regexp
          - protobufjs
          - qs
          - ws
          - zod
      test-tooling:
        dependency-type: development
        patterns:
          - "@esbuild/*"
          - "@rollup/*"
          - "@vitest/*"
          - vitest
          - vite
          - vite-node
          - rollup
          - esbuild
          - postcss
          - picomatch
      typescript-tooling:
        dependency-type: development
        patterns:
          - "@types/*"
          - typescript
    ignore:
      # zod is a public-API dependency: journal-gateway-protocol exports zod
      # schemas that the Journal monorepo consumes. A zod major (v3 -> v4) is not
      # wire/type-compatible across a mixed tree and must be a coordinated,
      # cross-repo protocol bump — never an automated PR. Security patches (minor/
      # patch) still flow.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]

# Databases for Journal Gateway end-to-end tests.
# Non-default host ports (5433/3307) avoid clashing with any local DB.
#
#   docker compose -f testing/e2e/docker-compose.yml up -d
#   docker compose -f testing/e2e/docker-compose.yml down -v
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: admin_pw
      POSTGRES_DB: analytics
    ports:
      - "5433:5432"
    volumes:
      - ./sql/postgres-setup.sql:/docker-entrypoint-initdb.d/10-setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics"]
      interval: 2s
      timeout: 5s
      retries: 30

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: admin_pw
      MYSQL_DATABASE: analytics
    ports:
      - "3307:3306"
    volumes:
      - ./sql/mysql-setup.sql:/docker-entrypoint-initdb.d/10-setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -padmin_pw --silent"]
      interval: 3s
      timeout: 5s
      retries: 40
